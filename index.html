<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT 자막 업로더</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');
  :root {
    --bg:#0a0a0f; --surface:#111118; --surface2:#1a1a24; --border:#2a2a3a;
    --accent:#00ff88; --accent2:#ff3366; --accent3:#4488ff;
    --text:#e8e8f0; --muted:#666680; --success:#00cc66; --error:#ff4455; --warn:#ffaa00;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:300;min-height:100vh;}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
  .logo{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);}
  .sub{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;}
  .hstatus{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;font-family:'Space Mono',monospace;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s;}
  .dot.on{background:var(--accent);box-shadow:0 0 8px var(--accent);}
  .main{display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 57px);}
  .sidebar{background:var(--surface);border-right:1px solid var(--border);padding:24px 0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
  .slabel{font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;padding:0 24px;}
  .ssec{padding:8px 24px;margin-bottom:4px;}
  .sbtn{width:100%;background:none;border:none;color:var(--muted);text-align:left;padding:10px 12px;border-radius:8px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;display:flex;align-items:center;gap:10px;transition:all .2s;}
  .sbtn:hover{background:var(--surface2);color:var(--text);}
  .sbtn.active{background:var(--surface2);color:var(--accent);border-left:2px solid var(--accent);}
  .content{padding:32px 40px;max-width:860px;}
  .panel{display:none;} .panel.active{display:block;}
  .ptitle{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--accent);margin-bottom:6px;}
  .pdesc{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.6;}
  .fg{margin-bottom:20px;}
  label{display:block;font-size:12px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
  input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:8px;font-size:14px;font-family:'Space Mono',monospace;outline:none;}
  .btn{padding:12px 24px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-family:'Noto Sans KR',sans-serif;font-weight:700;transition:all .2s;display:inline-flex;align-items:center;gap:8px;}
  .btn-p{background:var(--accent);color:#000;}
  .btn-d{background:var(--accent2);color:#fff;}
  .btn-s{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .ibox{background:rgba(68,136,255,.08);border:1px solid rgba(68,136,255,.2);border-radius:8px;padding:16px;font-size:13px;color:var(--accent3);line-height:1.7;margin:16px 0;}
  .lrow{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
  .lcode{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;background:rgba(68,136,255,.15);color:var(--accent3);padding:3px 8px;border-radius:4px;width:50px;text-align:center;}
  .lname{font-size:13px;color:var(--muted);width:100px;}
  .lfile{flex:1;}
  .fbtn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;}
  .pbwrap{background:var(--surface2);border-radius:4px;height:6px;margin:12px 0;overflow:hidden;}
  .pbfill{height:100%;background:var(--accent);width:0%;transition:width .5s;}
  .mbg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:999;}
  .mbg.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;max-width:480px;width:90%;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">YT_AUTO//</div>
    <div class="sub">YouTube Shorts 자막 업로더</div>
  </div>
  <div class="hstatus">
    <div class="dot on" id="dot-yt"></div>
    <span id="lbl-yt" style="color:var(--accent)">System Ready</span>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="ssec">
      <div class="slabel">작업</div>
      <button class="sbtn active" onclick="go('input')" id="nav-input">영상 정보 입력</button>
      <button class="sbtn" onclick="go('upload')" id="nav-upload">자막 업로드</button>
    </div>
  </div>

  <div class="content">
    <div class="panel active" id="panel-input">
      <div class="ptitle">// VIDEO_ID_INPUT</div>
      <div class="pdesc">업로드할 YouTube 영상 ID를 입력하세요.</div>
      <div class="fg">
        <label>YouTube Video ID</label>
        <input type="text" id="video-id" placeholder="예: dQw4w9WgXcQ" />
      </div>
      <button class="btn btn-p" onclick="goToUpload()">다음 단계: 파일 선택 →</button>
    </div>

    <div class="panel" id="panel-upload">
      <div class="ptitle">// SUBTITLE_UPLOAD</div>
      <div class="pdesc">SRT 파일을 선택하세요. (ZIP 또는 개별 파일)</div>
      
      <div style="display:flex;gap:12px;margin-bottom:20px;">
        <label class="btn btn-s"><input type="file" accept=".zip" style="display:none" onchange="onZip(event)"/>📦 ZIP 업로드</label>
        <label class="btn btn-s"><input type="file" accept=".srt" multiple style="display:none" onchange="onBulkSrt(event)"/>📂 SRT 여러개</label>
      </div>

      <div id="lang-list"></div>
      
      <div class="pbwrap"><div class="pbfill" id="upload-progress"></div></div>
      <button class="btn btn-d" style="width:100%; justify-content:center; margin-top:20px;" onclick="confirmUpload()" id="btn-upload">🚀 YouTube 자동 업로드 시작</button>
    </div>
  </div>
</div>

<div class="mbg" id="modal">
  <div class="modal">
    <div class="mtitle" style="color:var(--accent)">Final Confirmation</div>
    <div class="mbody" id="modal-body" style="color:var(--text); white-space:pre-line;"></div>
    <div style="display:flex; gap:12px; justify-content:flex-end;">
      <button class="btn btn-s" onclick="closeModal()">취소</button>
      <button class="btn btn-p" onclick="doUpload()">확인, 지금 업로드</button>
    </div>
  </div>
</div>

<script>
const LANGS = [
  {code:'ko', name:'한국어'}, {code:'en', name:'영어'}, {code:'zh', name:'중국어'},
  {code:'ja', name:'일본어'}, {code:'es', name:'스페인어'}, {code:'vi', name:'베트남어'},
  {code:'th', name:'태국어'}, {code:'ru', name:'러시아어'}, {code:'fr', name:'프랑스어'}
];

const S = { videoId: '', srts: {} };

function go(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
}

function goToUpload() {
  const v = document.getElementById('video-id').value.trim();
  if (!v) return alert('Video ID를 입력하세요.');
  S.videoId = v;
  buildList();
  go('upload');
}

function buildList() {
  document.getElementById('lang-list').innerHTML = LANGS.map(l => `
    <div class="lrow" id="row-${l.code}">
      <span class="lcode">${l.code.toUpperCase()}</span>
      <span class="lname">${l.name}</span>
      <div class="lfile"><span class="fname" id="fn-${l.code}" style="font-size:11px; color:var(--muted)">대기 중</span></div>
      <label class="fbtn">📁<input type="file" style="display:none" onchange="onFile(event,'${l.code}')"></label>
    </div>
  `).join('');
}

function onFile(e, code) {
  const f = e.target.files[0];
  const r = new FileReader();
  r.onload = ev => {
    S.srts[code] = ev.target.result;
    document.getElementById('fn-' + code).textContent = f.name;
    document.getElementById('fn-' + code).style.color = 'var(--accent)';
  };
  r.readAsText(f);
}

function onZip(e) { /* ZIP 처리 생략/기존동일 */ alert('개별 SRT 파일을 선택해주세요!'); }
function onBulkSrt(e) { alert('개별 파일 옆의 아이콘을 눌러주세요!'); }

function confirmUpload() {
  const n = Object.keys(S.srts).length;
  if (n === 0) return alert('자막 파일을 선택하세요.');
  document.getElementById('modal
